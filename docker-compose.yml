version: '3.9'

services:
  rebeca-app:
    image: node:20-alpine   # 🔥 downgrade para estabilidade
    container_name: rebeca-app-dev
    working_dir: /app

    volumes:
      - .:/app
      - /app/node_modules

    ports:
      - "3000:3000"

    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true

    command: sh -c "npm install && npx next dev --webpack"