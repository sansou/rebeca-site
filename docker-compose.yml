version: '3.9'

services:
  rebeca-app:
    image: node:24-alpine
    container_name: rebeca-app-dev
    working_dir: /app

    volumes:
      - .:/app
      - /app/node_modules

    ports:
      - "3000:3000"

    environment:
      - NODE_ENV=development

    command: sh -c "npm install && npm run dev"